spring.datasource.url=jdbc:h2:mem:files;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

app.file-storage.minio.endpoint=http://localhost:9000
app.file-storage.minio.access-key=test-access-key
app.file-storage.minio.secret-key=test-secret-key
app.file-storage.minio.initialize-buckets=false
