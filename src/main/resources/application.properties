spring.application.name=autoshop-file-storage-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${FILES_DB_URL:jdbc:postgresql://localhost:5433/files_db}
spring.datasource.username=${FILES_DB_USERNAME:}
spring.datasource.password=${FILES_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.file-storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.file-storage.minio.access-key=${MINIO_ACCESS_KEY:}
app.file-storage.minio.secret-key=${MINIO_SECRET_KEY:}
app.file-storage.minio.initialize-buckets=${MINIO_INITIALIZE_BUCKETS:true}
app.file-storage.presign.default-expiry-seconds=${FILE_PRESIGN_DEFAULT_EXPIRY_SECONDS:900}
app.file-storage.presign.max-expiry-seconds=${FILE_PRESIGN_MAX_EXPIRY_SECONDS:3600}
